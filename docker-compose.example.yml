services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finnews
      POSTGRES_PASSWORD: finnews
      POSTGRES_DB: finnews
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finnews -d finnews"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://finnews:finnews@postgres:5432/finnews?sslmode=disable
      LLM_BASE_URL: http://host.docker.internal:8317/v1
      LLM_API_KEY: sk-my-key-is-empty
      LLM_MODEL: gemini-3.1-flash-lite-preview
      LLM_MAX_CONCURRENCY: 3
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
      - ./db:/app/db:ro
      - ./prompts:/app/prompts:ro

volumes:
  pgdata:
