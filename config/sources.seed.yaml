sources:
  - key: fed_press_all
    name: Federal Reserve - All Press Releases
    type: rss
    url: https://www.federalreserve.gov/feeds/press_all.xml
    credibility_score: 100
    enabled: true
    full_content_allowed: true
    crawl_interval_minutes: 10
    max_age_hours: 72
    rate_limit_per_minute: 20
    respect_robots: true
    tags: [fed, macro, rates, official]

  - key: fed_press_monetary
    name: Federal Reserve - Monetary Policy Press Releases
    type: rss
