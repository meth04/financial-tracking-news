    credibility_score: 100
    enabled: true
    full_content_allowed: true
    crawl_interval_minutes: 10
    max_age_hours: 72
    rate_limit_per_minute: 30
    respect_robots: true
    tags: [regulation, official]
    config:
      agencies:
        - securities-and-exchange-commission
        - commodity-futures-trading-commission
        - federal-reserve-system
        - treasury-department
        - federal-deposit-insurance-corporation
        - comptroller-of-the-currency
        - consumer-financial-protection-bureau
      conditions:
        type:
          - RULE
          - PRORULE
          - NOTICE

  - key: treasury_press_releases
    name: U.S. Treasury - Press Releases
    type: html
    url: https://home.treasury.gov/news/press-releases
    credibility_score: 100
    enabled: true
    full_content_allowed: true
    crawl_interval_minutes: 10
    max_age_hours: 72
    rate_limit_per_minute: 15
    respect_robots: true
    tags: [treasury, sanctions, fiscal, official]
    config:
      min_content_chars: 300
      min_word_count: 45
      require_article_content: true
      html:
        list:
          item_selector: "article, .views-row, .view-content .views-row, li"
          link_selector: "a[href*='/news/press-releases/']"
          title_selector: "a, h2, h3"
          date_selector: "time, .datetime, .date, .field--name-created"
          date_attr: datetime
        article:
          title_selector: "h1"
          date_selector: "time, .datetime, .date, .field--name-created"
          date_attr: datetime
          body_selector: ".field--name-body, .node__content, article, main, .content"
          remove_selectors: [nav, header, footer, aside, .related, .social-share]
        filters:
          include_url_patterns: ["/news/press-releases/"]
          exclude_url_patterns: [".pdf", "/search", "/subscribe"]
          allowed_domains: [home.treasury.gov]
        date_formats: ["January 2, 2006", "Jan. 2, 2006", "2006-01-02"]
        max_items: 60
        max_article_fetches: 30
        allow_missing_dates: true

  - key: sec_edgar_watchlist
